<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/resume/" />
    <link rel="canonical" href="/resume/" />
    <title>Redirecting...</title>
  </head>
  <body>
    <p><a href="/resume/">Continue to /resume/</a></p>
  <script id="resume-mobile-sidebar-first">
(function () {
  function moveSidebarFirst() {
    if (!window.matchMedia("(max-width: 899px)").matches) return;

    var blocks = Array.from(document.querySelectorAll("aside, section, div"));
    var sidebar = blocks.find(function (el) {
      var t = (el.textContent || "").replace(/\s+/g, " ").trim();
      return t.includes("ZHEN LI") && t.includes("SKILLS") && t.includes("TOOLS");
    });

    var main = blocks.find(function (el) {
      var t = (el.textContent || "").replace(/\s+/g, " ").trim();
      return t.includes("WORK EXPERIENCE") && t.includes("META") && t.includes("LUCID MOTORS");
    });

    if (!sidebar || !main) return;
    var parent = main.parentElement;
    if (parent && sidebar.parentElement === parent && parent.firstElementChild !== sidebar) {
      parent.insertBefore(sidebar, main);
    }

    sidebar.style.setProperty("display", "block", "important");
    sidebar.style.setProperty("order", "-1", "important");
    main.style.setProperty("order", "1", "important");
  }

  moveSidebarFirst();
  window.addEventListener("load", moveSidebarFirst);
  window.addEventListener("resize", moveSidebarFirst);
})();
</script>
</body>
</html>
