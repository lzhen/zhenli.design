<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/resume/" />
    <link rel="canonical" href="/resume/" />
    <title>Redirecting...</title>
  </head>
  <body>
    <p><a href="/resume/">Continue to /resume/</a></p>
  <script id="resume-mobile-sidebar-first">
(function () {
  function moveSidebarFirst() {
    if (!window.matchMedia("(max-width: 899px)").matches) return;

    var blocks = Array.from(document.querySelectorAll("aside, section, div"));
    var sidebar = blocks.find(function (el) {
      var t = (el.textContent || "").replace(/\s+/g, " ").trim();
      return t.includes("ZHEN LI") && t.includes("SKILLS") && t.includes("TOOLS");
    });

    var main = blocks.find(function (el) {
      var t = (el.textContent || "").replace(/\s+/g, " ").trim();
      return t.includes("WORK EXPERIENCE") && t.includes("META") && t.includes("LUCID MOTORS");
    });

    if (!sidebar || !main) return;
    var parent = main.parentElement;
    if (parent && sidebar.parentElement === parent && parent.firstElementChild !== sidebar) {
      parent.insertBefore(sidebar, main);
    }

    sidebar.style.setProperty("display", "block", "important");
    sidebar.style.setProperty("order", "-1", "important");
    main.style.setProperty("order", "1", "important");
  }

  moveSidebarFirst();
  window.addEventListener("load", moveSidebarFirst);
  window.addEventListener("resize", moveSidebarFirst);
})();
</script>
<script id="hide-resume-identity-single-column">
(function () {
  function hideIdentityCard() {
    var singleColumn = window.matchMedia("(max-width: 1180px)").matches;
    var nodes = Array.from(document.querySelectorAll("body *"));

    nodes.forEach(function (el) {
      el.style.removeProperty("display");
      el.style.removeProperty("height");
      el.style.removeProperty("overflow");
    });

    if (!singleColumn) return;

    var matches = nodes.filter(function (el) {
      var text = (el.textContent || "").replace(/\s+/g, " ").trim();
      return text.includes("ZHEN LI") &&
        text.includes("lizhen02.com") &&
        text.includes("Product design leader") &&
        !text.includes("SKILLS") &&
        !text.includes("WORK EXPERIENCE");
    });

    matches.sort(function (a, b) {
      return a.getBoundingClientRect().height - b.getBoundingClientRect().height;
    });

    var card = matches.find(function (el) {
      var h = el.getBoundingClientRect().height;
      return h > 120 && h < 700;
    }) || matches[0];

    if (card) {
      card.style.setProperty("display", "none", "important");
      card.style.setProperty("height", "0", "important");
      card.style.setProperty("overflow", "hidden", "important");
    }
  }

  hideIdentityCard();
  window.addEventListener("load", hideIdentityCard);
  window.addEventListener("resize", hideIdentityCard);
})();
</script>
</body>
</html>
