  <body>
    <p><a href="/resume/">Continue to /resume/</a></p>
  <script id="hide-resume-identity-single-column">
(function () {
  function hideResumeIdentity() {
    if (!window.matchMedia("(max-width: 1180px)").matches) return;

    var emailNode = Array.from(document.querySelectorAll("body *")).find(function (el) {
      return (el.textContent || "").trim() === "lizhen02.com";
    });

    if (!emailNode) {
      emailNode = Array.from(document.querySelectorAll("body *")).find(function (el) {
        return (el.textContent || "").includes("lizhen02.com");
      });
    }

    if (!emailNode) return;

    var card = emailNode;
    while (card && card !== document.body) {
      var text = (card.textContent || "").replace(/\s+/g, " ").trim();
      var hasIdentity = text.includes("ZHEN LI") && text.includes("Product design leader") && text.includes("lizhen02.com");
      var tooLarge = text.includes("WORK EXPERIENCE") || text.includes("META") || text.includes("LUCID MOTORS");

      if (hasIdentity && !tooLarge) break;
      card = card.parentElement;
    }

    if (!card || card === document.body) return;

    card.style.setProperty("display", "none", "important");
    card.style.setProperty("height", "0", "important");
    card.style.setProperty("margin", "0", "important");
    card.style.setProperty("padding", "0", "important");
    card.style.setProperty("overflow", "hidden", "important");
  }

  hideResumeIdentity();
  window.addEventListener("load", hideResumeIdentity);
  window.addEventListener("resize", hideResumeIdentity);
})();
</script>
